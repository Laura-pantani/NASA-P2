<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA70 — Progetti Studenti</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #000000;
      --primary-dim: #333333;
      --ring-color: rgba(0,0,0,0.05);
      --text-dim: #555555;
      --card-bg: rgba(255,255,255,0.95);
    }

    html, body {
      width: 100%; height: 100%;
      background: #f4f4f4;
      color: #000;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* ---- STARS ---- */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ---- SCENE ---- */
    #scene {
      position: fixed; inset: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      perspective: 900px;
    }

    /* ---- LOGO 3D ---- */
    #logo-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    #logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(70px, 10vw, 110px);
      letter-spacing: 0.05em;
      line-height: 1;
      text-align: center;
      color: #070707;
      position: relative;
      user-select: none;
      transform: rotateX(10deg);
      transform-style: preserve-3d;
      
    }

    @keyframes logo-float {
      0%, 100% { transform: rotateX(10deg) translateY(0px); }
      50%       { transform: rotateX(10deg) translateY(-12px); }
    }

    #logo-sub {
      font-family: 'Space Mono', monospace;
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      margin-top: 10px;
      opacity: 0;
      
    }

    @keyframes fade-in { to { opacity: 1; } }

    /* ---- METEORITE CARDS ---- */
    .meteorite {
      position: absolute;
      width: 0; height: 0;
      top: 50%; left: 50%;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .meteorite-inner {
      position: absolute;
      transform-style: preserve-3d;
      pointer-events: all;
      cursor: pointer;
    }

    .met-card {
      background: #ffffff33;
      border: none;
      border-radius: 0;
      padding: 4px;
      width: 100px;
      transition: transform 0.25s;
      pointer-events: all;
      text-align: center;
    }

    .met-card:hover {
      transform: scale(1.6) translateZ(50px);
    }

    .met-img {
      width: 100%; height: 55px;
      object-fit: cover;
      border-radius: 0;
      display: block;
      background: #dddddd;
    }

    .met-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: #000;
      line-height: 1.3;
      letter-spacing: 0.03em;
      text-shadow: none;
      transition: color 0.3s ease;
    }

    .met-author {
      font-size: 8px;
      color: #000;
      margin-top: 2px;
      text-shadow: none;
      transition: color 0.3s ease;
    }

    /* ---- MODAL ---- */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--card-bg);
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 0;
      max-width: 520px;
      width: 90vw;
      overflow: hidden;
      animation: modal-in 0.3s cubic-bezier(.22,.68,0,1.2);
      position: relative;
    }

    @keyframes modal-in {
      from { opacity:0; transform: scale(0.88) translateY(20px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    #modal-img {
      width: 100%; height: 220px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    #modal-body {
      padding: 24px 28px 28px;
    }

    #modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #000;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    #modal-author {
      font-size: 11px;
      color: #000;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    #modal-date {
      font-size: 10px;
      color: #000;
      margin-bottom: 14px;
    }

    #modal-desc {
      font-size: 12px;
      line-height: 1.75;
      color: #000;
      margin-bottom: 18px;
    }

    #modal-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 22px;
    }

    .tag {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.15);
      color: #000;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 0;
    }

    #modal-actions {
      display: flex; gap: 12px;
    }

    .btn-primary {
      flex: 1;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 11px 0;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      text-align: center;
      display: block;
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-close {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 11px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-close:hover { color: #000; border-color: #000; }

    /* ---- LOADING ---- */
    #loader {
      position: fixed; inset: 0; z-index: 200;
      background: #ffffff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      transition: opacity 0.7s;
    }

    #loader.hidden { opacity: 0; pointer-events: none; }

    .loader-video {
      width: 100px;
      height: auto;
      display: block;
    }

    @keyframes loader-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.7; }
    }

    .loader-bar-wrap {
      width: 200px;
      height: 2px;
      background: #ffffff;
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar {
      height: 50%;
      background: var(--primary);
      width: 0%;
      transition: width 2s ease;
      border-radius: 2px;
    }

    .loader-text {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
    }

    /* ---- HINT ---- */
    #hint {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 10px;
      color: #445;
      letter-spacing: 0.05em;
      animation: hint-pulse 3s ease-in-out infinite;
    }

    @keyframes hint-pulse {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 0.9; }
    }

    /* ---- FILTERS ---- */
    #filters-container {
      position: fixed;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-height: 80vh;
    }

    #search-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 8px 0;
      outline: none;
      color: #000;
      width: 160px;
    }

    #search-input::placeholder { color: #bbb; }

    #filters-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-left: 1px solid rgba(0,0,0,0.1);
      padding: 0 0 0 20px;
      overflow-y: auto;
      scrollbar-width: none; /* Firefox */
    }

    #filters-wrap::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .filter-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-align: left;
      cursor: pointer;
      letter-spacing: 0.15em;
      transition: all 0.3s ease;
      opacity: 0.5;
    }

    .filter-btn:hover { color: #000; opacity: 1; transform: translateX(5px); }
    .filter-btn.active { 
      color: var(--primary); 
      opacity: 1; 
      font-weight: 700; 
      text-decoration: underline;
    }

    #top-left-logo {
      position: fixed;
      top: 20px;
      right: 40px;
      width: 100px;
      height: auto;
      z-index: 1200;
      pointer-events: none;
    }
  </style>
</head>

<script>
// ---- STARFIELD ----
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    buildStars();
  }

  function buildStars() {
    stars = [];
    const n = Math.floor((canvas.width * canvas.height) / 2200);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.005,
        speed: Math.random() * 0.06 + 0.01
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a = Math.max(0.1, Math.min(1, s.a + s.da));
      if (Math.random() < 0.005) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${s.a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

// ---- DATA + ORBIT ----
// ---- IMAGE CONFIG ----
const DATA_URL = "https://ixd-supsi.github.io/n70api/data.json";
const IMAGE_URL = "https://ixd-supsi.github.io/n70api/immagini/";
const PLACEHOLDER_IMAGE = "immagini/thumbnail.jpg";

// ---- GET IMAGE FILE ----
function getImageFile(item) {
  // prova tutti i possibili campi
  let file =
    item.immagine_1 ||
    item.immagine1 ||
    item.image ||
    item.img ||
    item.thumbnail ||
    (Array.isArray(item.immagine) ? item.immagine[0] : item.immagine) ||
    (Array.isArray(item.immagini) ? item.immagini[0] : item.immagini);

  // se non esiste ritorna null
  if (!file) {
    console.warn("Nessuna immagine trovata per:", item);
    return null;
  }

  // rimuove slash iniziali
  file = file.replace(/^\/+/, "");

  return file;
}

function getImageUrl(item) {
  const file = getImageFile(item);
  if (!file || file.includes("...")) return PLACEHOLDER_IMAGE;
  if (/^https?:\/\//i.test(file)) return file;
  return IMAGE_URL + encodeURIComponent(file);
}

const scene = document.getElementById('scene');
const orbitRoot = document.getElementById('orbit-root');
const overlay = document.getElementById('modal-overlay');
const loaderBar = document.getElementById('loader-bar');
const loader = document.getElementById('loader');

// Animate loader bar
requestAnimationFrame(() => { loaderBar.style.width = '80%'; });

let paused = false;
let startTime = null; // Used for animation timing

// Global variables for current orbit state, will be updated by tag selection
let currentOrbitRadiusX = 300;
let currentOrbitRadiusY = 200;
let currentTiltX = 80;
let currentTiltZ = -120;
let currentOrbitSpeedMultiplier = 1; // Multiplier for overall orbit speed


// We'll spread meteorites evenly around the ring
// Each meteorite has a phase offset and angular speed

let meteorites = []; // {el, inner, angle, speed, data}

function degToRad(d) { return d * Math.PI / 180; }

// Define orbit configurations for different tags
const tagOrbitConfigs = {
  'all': {
    orbitRadiusX: 300,
    orbitRadiusY: 200,
    tiltX: 80,
    tiltZ: -120,
    orbitSpeedMultiplier: 1 // Default speed
  },
  'exploration': {
    orbitRadiusX: 400,
    orbitRadiusY: 150,
    tiltX: 70,
    tiltZ: -100,
    orbitSpeedMultiplier: 0.8 // Slower
  },
  'Mars': {
    orbitRadiusX: 280,
    orbitRadiusY: 280, // More circular
    tiltX: 40,
    tiltZ: -90,
    orbitSpeedMultiplier: 1.5 // Faster
  },
  'sounds': {
    orbitRadiusX: 200,
    orbitRadiusY: 100,
    tiltX: 10,
    tiltZ: -170,
    orbitSpeedMultiplier: 2.0 // Very fast, almost flat
  },
  'visualization': {
    orbitRadiusX: 350,
    orbitRadiusY: 250,
    tiltX: 60,
    tiltZ: -130,
    orbitSpeedMultiplier: 1.2 // Slightly faster
  },
  'moon': {
    orbitRadiusX: 250,
    orbitRadiusY: 180,
    tiltX: 90, // More vertical
    tiltZ: -160,
    orbitSpeedMultiplier: 0.7 // Slower
  },
  'climate change': {
    orbitRadiusX: 500,
    orbitRadiusY: 220,
    tiltX: 50,
    tiltZ: -110,
    orbitSpeedMultiplier: 1.1
  },
  'satellites': {
    orbitRadiusX: 380,
    orbitRadiusY: -90,
    tiltX: 75,
    tiltZ: -140,
    orbitSpeedMultiplier: 0.9
  },
  'game': {
    orbitRadiusX: 270,
    orbitRadiusY: 230,
    tiltX: 80,
    tiltZ: -80,
    orbitSpeedMultiplier: 1.8
  },
  'educational': {
    orbitRadiusX: 310,
    orbitRadiusY: 210,
    tiltX: 85,
    tiltZ: -125,
    orbitSpeedMultiplier: 1.0
  },
  'solar system': {
    orbitRadiusX: 450,
    orbitRadiusY: 100, // Very elliptical
    tiltX: 20,
    tiltZ: -10,
    orbitSpeedMultiplier: 0.6
  }
  // Add more as needed, or a default fallback for unconfigured tags
};

// Helper per formattare il testo: Prima maiuscola, resto minuscolo (esclude NASA70)
function formatText(str) {
  if (!str) return "";
  if (str.toUpperCase() === "NASA70") return "NASA70";
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

function buildMeteoriteEl(item, img) {
  const wrap = document.createElement('div');
  wrap.className = 'meteorite';
  wrap.style.position = 'absolute';
  wrap.style.width = '0';
  wrap.style.height = '0';
  wrap.style.top = '50%';
  wrap.style.left = '50%';

  const inner = document.createElement('div');
  inner.className = 'meteorite-inner';
  inner.style.transform = 'translate(-50%, -50%)';

  const card = document.createElement('div');
  card.className = 'met-card';

  const imgEl = document.createElement('img');
imgEl.className = 'met-img';
imgEl.alt = item.titolo;
imgEl.loading = 'lazy';

// se esiste immagine usa quella
if (img) {
  imgEl.src = img;
} else {
  imgEl.src = PLACEHOLDER_IMAGE;
}

// fallback se immagine non caricata
imgEl.onerror = () => {
  console.error("Immagine non trovata:", imgEl.src);
  imgEl.src = PLACEHOLDER_IMAGE;
};

  const title = document.createElement('div');
  title.className = 'met-title';
  title.textContent = formatText(item.titolo);

  const author = document.createElement('div');
  author.className = 'met-author';
  author.textContent = formatText(item.autore);

  card.appendChild(imgEl);
  card.appendChild(title);
  card.appendChild(author);
  inner.appendChild(card);
  wrap.appendChild(inner);

  card.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal(item);
  });

  return { wrap, inner, title, author };
}

function openModal(item) {
  paused = true;
  const imagePath = getImageUrl(item);
  
  document.getElementById('modal-img').src = imagePath;
  document.getElementById('modal-img').alt = item.titolo;
  document.getElementById('modal-title').textContent = formatText(item.titolo);
  document.getElementById('modal-author').textContent = formatText(item.autore);
  document.getElementById('modal-date').textContent =
    `${item.data.giorno}. ${item.data.mese}. ${item.data.anno}`;
  document.getElementById('modal-desc').textContent = item.descrizione || '';
  const tagsEl = document.getElementById('modal-tags');
  tagsEl.innerHTML = '';
  (item.tags || []).forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = formatText(t);
    tagsEl.appendChild(span);
  });
  document.getElementById('modal-link').href = item.url;
  overlay.classList.add('open');
}

function closeModal() {
  overlay.classList.remove('open');
  paused = false;
}

document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

function animate(ts) {
  if (!startTime) startTime = ts;
  if (!paused) {
    const elapsed = (ts - startTime) * 0.001 * currentOrbitSpeedMultiplier; // Apply global speed multiplier
    meteorites.forEach(m => {
      m.angle = m.baseAngle + elapsed * m.speed;
      const rad = m.angle;
      const x = Math.cos(rad) * currentOrbitRadiusX; // Use current radius
      const y = Math.sin(rad) * currentOrbitRadiusY; // Use current radius

      // Project from the tilted ring plane to screen
      const tiltX = degToRad(currentTiltX); // Use current tilt
      const tiltZ = degToRad(currentTiltZ); // Use current tilt

      // 3D coords in ring plane: (x, 0, y)
      // After rotateX(tiltX): (x, -z*sin + 0*cos, 0*sin + z*cos) = (x, -y*sin(tiltX), y*cos(tiltX))
      const px = x;
      const py = -y * Math.sin(tiltX);
      const pz = y * Math.cos(tiltX);
      
      // After rotateZ(tiltZ):
      const fx = px * Math.cos(tiltZ) - py * Math.sin(tiltZ);
      const fy = px * Math.sin(tiltZ) + py * Math.cos(tiltZ);
      const fz = pz;
      
      // Perspective
      const persp = 900;
      const scale = persp / (persp + fz);
      const sx = fx * scale;
      const sy = fy * scale;

      m.wrap.style.transform =
        `translate(${sx}px, ${sy}px) scale(${scale})`;

      // Mantieni opacità piena e imposta z-index
      m.wrap.style.zIndex = Math.round(1000 - fz);
    });
  }
  requestAnimationFrame(animate);
}

// Funzione per l'effetto "Matrix" sul testo del logo
function scrambleText(element, finalText) {
  const chars = '!<>-_\\/[]{}—=+*^?#________';
  let iteration = 0;
  
  // Ridimensiona il font se il testo è lungo (es. "CLIMATE CHANGE")
  element.style.fontSize = finalText.length > 8 ? 'clamp(35px, 7vw, 60px)' : '';

  const interval = setInterval(() => {
    element.innerText = finalText.split("")
      .map((letter, index) => {
        if (index < iteration) return finalText[index];
        return chars[Math.floor(Math.random() * chars.length)];
      }).join("");
    if (iteration >= finalText.length) clearInterval(interval);
    iteration += 1/3;
  }, 30);
}

async function init() {
  try {
    // Velocizza la riproduzione del video del loader
    const loaderVideo = document.querySelector('.loader-video');
    if (loaderVideo) {
      loaderVideo.playbackRate = 3;
    }
    
    // Initialize orbit parameters with 'all' config
    const initialConfig = tagOrbitConfigs['all'];
    currentOrbitRadiusX = initialConfig.orbitRadiusX;
    currentOrbitRadiusY = initialConfig.orbitRadiusY;
    currentTiltX = initialConfig.tiltX;
    currentTiltZ = initialConfig.tiltZ;
    currentOrbitSpeedMultiplier = initialConfig.orbitSpeedMultiplier;

    const rawData = await fetch(DATA_URL).then(r => {
      if (!r.ok) throw new Error(`Errore API: ${r.status}`);
      return r.json();
    });
    const data = [...rawData, ...rawData]; // Duplica i progetti per popolare maggiormente l'orbita
    loaderBar.style.width = '100%';

    // Funzione per pulire i tag e unificare i duplicati (2D, 3D, 3D program)
    const cleanTag = (t) => {
      const s = (t || "").trim();
      if (s.toLowerCase() === "3d" || s.toLowerCase() === "3d program") return "3D";
      if (s.toLowerCase() === "2d") return "2D";
      return s;
    };

    const uniqueTags = [...new Set(data.flatMap(item => (item.tags || []).map(cleanTag)))]
      .filter(t => t.length > 0)
      .sort((a, b) => a.localeCompare(b));

    const filtersContainer = document.getElementById('filters-wrap');
    const searchInput = document.getElementById('search-input');
    let searchTerm = '';
    let currentFilter = 'all';
    
    const renderFilters = () => {
      filtersContainer.innerHTML = '';
      const filteredTags = uniqueTags.filter(t => t.toLowerCase().includes(searchTerm.toLowerCase()));
      const displayList = ['all', ...filteredTags];

      displayList.forEach(tag => {
        // Contatore progetti per tag (usando la logica di pulizia)
        const count = tag === 'all' 
          ? data.length 
          : data.filter(item => (item.tags || []).map(cleanTag).includes(tag)).length;

        // Mostra nell'indice solo i tag che hanno più di 3 progetti associati (eccetto per 'all')
        if (tag !== 'all' && count <= 3) return;

        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (tag === currentFilter ? ' active' : '');
        
        const tagLabel = tag === 'all' ? 'NASA70' : formatText(tag);
        btn.textContent = tag === 'all' ? `${tagLabel} [${count}]` : `• ${tagLabel} [${count}]`;
        
        btn.onclick = () => {
          currentFilter = tag;
          const targetTag = tag === 'all' ? null : tag;

          // Get the orbit config for the current tag, fallback to 'all' if not defined
          const config = tagOrbitConfigs[tag] || tagOrbitConfigs['all'];

          // Update global orbit parameters
          currentOrbitRadiusX = config.orbitRadiusX;
          currentOrbitRadiusY = config.orbitRadiusY;
          currentTiltX = config.tiltX;
          currentTiltZ = config.tiltZ;
          currentOrbitSpeedMultiplier = config.orbitSpeedMultiplier;
          
          // Effetto Matrix sul Logo
          const newTitle = tag === 'all' ? 'NASA70' : formatText(tag);
          scrambleText(document.getElementById('logo'), newTitle);

          meteorites.forEach(m => {
            const isVisible = !targetTag || (m.data.tags && m.data.tags.map(cleanTag).includes(targetTag));
            m.wrap.style.display = isVisible ? 'block' : 'none';
          });
          renderFilters();
        };
        filtersContainer.appendChild(btn);
      });
    };

    searchInput.oninput = (e) => {
      searchTerm = e.target.value;
      renderFilters();
    };

    renderFilters();

    data.forEach((item, i) => {
      const baseAngle = (i / data.length) * Math.PI * 2;
      const speed = 0.08; // Constant slower speed for all cards
      const { wrap, inner, title, author } = buildMeteoriteEl(item, getImageUrl(item));
      scene.appendChild(wrap);
      meteorites.push({ wrap, inner, title, author, baseAngle, angle: baseAngle, speed, data: item });
    });

    setTimeout(() => {
      loader.classList.add('hidden');
      setTimeout(() => { loader.style.display = 'none'; }, 700);
    }, 600);

    requestAnimationFrame(animate);

  } catch (err) {
    console.error(err);
    loader.querySelector('.loader-text').textContent = 'Errore nel caricamento dei dati.';
  }
}

init();
</script>
</body>
</html>
